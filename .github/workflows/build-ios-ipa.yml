name: Build unsigned IPA

on:
  push:
    branches: [ main ]
    paths:
      - 'lib/**'
      - 'ios/**'
      - 'pubspec.yaml'
      - '.github/workflows/build-ios-ipa.yml'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  analyze:
    name: Code Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.9'
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Run flutter analyze
        run: flutter analyze

      - name: Run tests
        run: flutter test

  build-ipa:
    name: Build iOS IPA
    needs: analyze
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.9'
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Build iOS (unsigned)
        run: |
          flutter build ios --release --no-codesign

      - name: Create unsigned IPA
        run: |
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r ai_subtitle_translator-unsigned.ipa Payload
          rm -rf Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ai_subtitle_translator-unsigned-ipa
          path: ai_subtitle_translator-unsigned.ipa
          retention-days: 30

      - name: Generate build summary
        run: |
          echo "### 🎉 Build Successful!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Build Info:**" >> $GITHUB_STEP_SUMMARY
          echo "- App Name: AI 字幕" >> $GITHUB_STEP_SUMMARY
          echo "- Version: 2.0.0" >> $GITHUB_STEP_SUMMARY
          echo "- Bundle ID: ai_subtitle_translator" >> $GITHUB_STEP_SUMMARY
          echo "- Platform: iOS 26.0+" >> $GITHUB_STEP_SUMMARY
          echo "- Design: Liquid Glass" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Artifact:** \`ai_subtitle_translator-unsigned.ipa\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Download the unsigned IPA from the artifacts section above." >> $GITHUB_STEP_SUMMARY
          echo "You can sign it with AltStore, Sideloadly, or your own signing process." >> $GITHUB_STEP_SUMMARY
