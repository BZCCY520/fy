name: emby_media_player
description: "Emby media player with Liquid Glass UI and Dolby audio support."
publish_to: 'none'

version: 3.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  http: ^1.6.0
  shared_preferences: ^2.5.5
  file_picker: ^11.0.2
  cached_network_image: ^3.3.0
  sqflite: ^2.3.0
  path_provider: ^2.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
